name: "Draw Keymap"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "config/keymap.keymap"
      - ".github/config/keymap_drawer.config.yaml"
      - "boards/shields/torabo_tsuki/torabo_tsuki.dtsi"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@3a4ca7e060a54ba700d3e7b6a43cb0b9cec347d2
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
      amend_commit: false
      keymap_patterns: "config/*.keymap"
      json_path: "config"
      config_path: ".github/config/keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      destination: "both"
